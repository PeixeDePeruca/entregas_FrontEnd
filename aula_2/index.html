<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">

</head>
<body class="Fundo">
    
    <h1 class="h1">Cadastro do Usuário</h1>

    
<iframe class="iframe"    width="560" height="315" src="https://www.youtube.com/embed/9lNZ_Rnr7Jc?si=G8lH52NP583697ZM" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <div class="Container">
        <form id="formCadastro">
            <!--Texto antes da caixa de input-->
            <label class="Text1" for="nome">Nominho do Indivíduo: </label>

            <!--Texto dentro da caixa de input-->
            <input type="text" name="nome" id="nome" placeholder="Insira teu nome, manito :P" required>
            <br><br>

    <!--no exemplo essa parte é o email, tanto o "for" e o "type"-->
            <label class="Text2" for="cartão">Número do Cartão:   </label>
            <input type="text" name="cartão" id="cartão" placeholder="É seguro pô! ;)" required>

            <br><br>

            <!--Texto antes da caixa de input-->
            <label class="Text1" for="Idade">Quantos Aninhos: </label>

            <!--caixa de input-->
            <input type="number" name="Idade" id="Idade" required>
            <br><br>

            
            <!--Botão para enviar info-->
            <button class="button"  type="submit">Enviar!</button>
        </form>
    
    </div>
    <script> src="script.js"></script>
</body>
</html>
